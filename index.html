<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Showreel</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: #000;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
}

.video-container {
  width: 90vw;
  max-width: 1400px;
  aspect-ratio: 16 / 9;
}

iframe {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
}
</style>
</head>

<body>

<div class="video-container">
  <iframe
    src="https://player.mediadelivery.net/play/670054/3d0d285d-57a4-4715-8a6a-66dd5500a4dd"
    allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;"
    allowfullscreen>
  </iframe>
</div>

</body>
</html>
