<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<title>Showreel</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: #000;
  color: #fff;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
}

.wrapper {
  width: 90vw;
  max-width: 1400px;
}

.title {
  text-align: center;

}

.video-container {
  position: relative;
  padding-top: 56.25%;
}

.video-container iframe {
  border: 0;
  position: absolute;
  top: 0;
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="title">
    EMANUELE DI BACCO · DIGITAL COMPOSITOR · SHOWREEL 2026 (2Q)
  </div>

  <div class="video-container">
    <iframe
      src="https://player.mediadelivery.net/embed/670054/3d0d285d-57a4-4715-8a6a-66dd5500a4dd?autoplay=false&loop=false&muted=false&preload=true&responsive=true"
      loading="lazy"
      allow="accelerometer;gyroscope;autoplay;encrypted-media;picture-in-picture;fullscreen;"
      allowfullscreen="true">
    </iframe>
  </div>

</div>

</body>
</html>
