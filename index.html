<!DOCTYPE html>
<html lang="en">
<head>

<title>Showreel</title>

<style>

  margin: 0;
  width: 100%;
  height: 100%;
  background: #000;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
}

  max-width: 1400px;
}
</style>

</head>
<body>

<div class="video-container">

<div style="position:relative;padding-top:56.25%;">

</div>
